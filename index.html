<!DOCTYPE html>
<html>
<head>
    <title>Interactive Profile Card Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Interactive Profile Card Builder</h1>
    <div class="container">
   
        <!-- Card 1 -->
        <div class="card">
            <h2 id="name1">Maryam</h2>
            <p id="role1">Frontend Developer</p>
            <button class="greetButton">Greet Me</button>
            <p class="message"></p>
            <p class="count">Clicked 0 times</p>
        </div>
         
        <!-- Card 2-->
        <div class="card">
            <h2 id="name2">Ali</h2>
            <p id="role2">Backend Developer</p>
            <button class="greetButton">Greet Me</button>
            <p class="message"></p>
            <p class="count">Clicked 0 times</p>
        </div>
        <!-- Card 3-->
        <div class="card">
            <h2 id="name3">Ayesha</h2>
            <p id="role3">Full Stack Developer</p>
            <button class="greetButton">Greet Me</button>
            <p class="message"></p>
            <p class="count">Clicked 0 times</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
